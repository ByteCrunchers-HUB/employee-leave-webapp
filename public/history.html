<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leave History - LeaveHub</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav class="nav-bar glass">
        <div style="display: flex; align-items: center; gap: 8px;">
            <i data-lucide="layout-dashboard" style="color: var(--primary); width: 24px;"></i>
            <div class="nav-logo">LeaveHub</div>
        </div>

        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link"><i data-lucide="home"></i> Dashboard</a>
            <a href="/apply.html" class="nav-link"><i data-lucide="send"></i> Apply Leave</a>
            <a href="/history.html" class="nav-link active"><i data-lucide="history"></i> History</a>
            <a href="/profile.html" class="nav-link"><i data-lucide="user"></i> Profile</a>
        </div>

        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="pNameTop" style="font-size: 0.875rem; font-weight: 500; color: var(--text-muted);"></span>
            <button id="logoutBtn" class="btn btn-secondary">
                <i data-lucide="log-out" style="width: 16px; margin-right: 6px;"></i> Logout
            </button>
        </div>
    </nav>

    <main class="dashboard-container anim-fade-in">
        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Leave Request History</h1>
            <p style="color: var(--text-muted);">Manage and track your previous leave requests.</p>
        </div>

        <section class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Type</th>
                            <th>Period</th>
                            <th>Days</th>
                            <th>Reason</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="myRows"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Dummy IDs to avoid JS errors -->
    <div style="display:none">
        <span id="pEmpId"></span><span id="pName"></span><span id="pDept"></span>
        <span id="pDesig"></span><span id="pEmail"></span><span id="pPhone"></span>
        <span id="balance"></span>
        <input id="leaveType"><input id="reason"><input id="startDate"><input id="endDate">
        <button id="applyBtn"></button>
        <div id="applyMsg"></div>
    </div>

    <script src="/assets/employee.js"></script>
    <script>
        lucide.createIcons();
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('pNameTop').innerText = user.name;
    </script>
</body>

</html>
